# RedisManager — global configuration
# /opt/redismanager/etc/redismanager.conf

# Path to redis-server binary (CloudLinux alt-redis by default)
REDIS_BINARY="/opt/alt/redis/bin/redis-server"

# Path to redis-cli binary
REDIS_CLI="/opt/alt/redis/bin/redis-cli"

# Default maxmemory per instance (MB)
DEFAULT_MEMORY_MB=64

# Default maxclients per instance
DEFAULT_MAXCLIENTS=128

# Total memory budget for all managed instances (MB)
# The 'enable' command will refuse new instances if budget is exceeded
TOTAL_BUDGET_MB=2048

# Base directory for user Redis data
USER_REDIS_DIR=".redis-managed"

# Socket filename
SOCKET_NAME="redis.sock"

# Use cagefs_enter.proxied to launch Redis inside CageFS
USE_CAGEFS=true
CAGEFS_ENTER="/bin/cagefs_enter.proxied"

# State file tracking enabled users
STATE_FILE="/var/lib/redismanager/state.json"

# Log directory
LOG_DIR="/var/log/redismanager"
